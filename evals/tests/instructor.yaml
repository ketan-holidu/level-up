- description: "instructor-0: New topic with empty config"
  vars:
    prompt: "/levelUp:learn docker"
    files_context: |
      === plugin/levelUp/skills/config/config.json ===
      []
  assert:
    - type: llm-rubric
      value: |
        Creates a well-formed config.json entry with all 4 fields (topic, workspace,
        started_at, last_active). Proceeds to persona selection.

- description: "instructor-1: Status with malformed config entry"
  vars:
    prompt: "/levelUp:status"
    files_context: |
      === plugin/levelUp/skills/config/config.json ===
      [{"topic":"docker","workspace":"./docker/","started_at":"2026-03-20T10:00:00Z","last_active":"2026-03-20T12:00:00Z"},{"topic":"rust"}]

      === docker/levelup_state/progress.json ===
      {"topic":"docker","persona":"balanced","state":"TEACHING","current_module_index":1,"modules":[{"title":"Containers 101","status":"completed","summary":"Covered container basics."},{"title":"Images & Layers","status":"in_progress"}]}
  assert:
    - type: llm-rubric
      value: |
        Skips the malformed entry (missing workspace field), shows only the valid 'docker'
        topic progress, and warns the user that one entry was skipped due to missing fields.

- description: "instructor-2: Resume existing topic - no duplicate"
  vars:
