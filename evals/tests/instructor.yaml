- description: "instructor-8: Inline code submission triggers review"
  vars:
    prompt: |
      I'm done with the exercise, here's my code:

      ```python
      from flask import Flask
      app = Flask(__name__)

      @app.route('/')
      def hello():
          return 'Hello Docker!'

      if __name__ == '__main__':
          app.run(host='0.0.0.0', port=5000)
      ```

      And my Dockerfile:

      ```dockerfile
      FROM python:3.11-slim
      WORKDIR /app
      COPY requirements.txt .
      RUN pip install -r requirements.txt
      COPY . .
      EXPOSE 5000
      CMD ["python", "app.py"]
      ```
    files_context: |
      === plugin/levelUp/skills/config/config.json ===
      [{"topic":"docker","workspace":"./docker/","started_at":"2026-03-20T10:00:00Z","last_active":"2026-03-21T14:00:00Z"}]

      === docker/levelup_state/progress.json ===
      {"topic":"docker","persona":"balanced","language":"python","state":"EXERCISE","current_module_index":1,"modules":[{"title":"Containers 101","status":"completed","summary":"Covered containers vs VMs, docker run/ps/stop."},{"title":"Images & Layers","status":"in_progress"},{"title":"Volumes & Networking","status":"upcoming"}]}

