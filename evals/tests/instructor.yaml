- description: "instructor-6: TEACHING to EXERCISE transition"
  vars:
    prompt: "I've finished learning about containers, let's move on to the exercise."
    files_context: |
      === plugin/levelUp/skills/config/config.json ===
      [{"topic":"docker","workspace":"./docker/","started_at":"2026-03-20T10:00:00Z","last_active":"2026-03-20T12:00:00Z"}]

      === docker/levelup_state/progress.json ===
      {"topic":"docker","persona":"balanced","language":"python","state":"TEACHING","current_module_index":0,"modules":[{"title":"Containers 101","status":"in_progress"},{"title":"Images & Layers","status":"upcoming"},{"title":"Volumes & Networking","status":"upcoming"}]}

      === docker/levelup_state/curriculum.md ===
      # Docker Curriculum

      ## Modules

      ### Module 1: Containers 101
      **Objectives:** Understand what containers are, run and manage containers
      **Key Concepts:** containers vs VMs, docker run, docker ps, docker stop
      **Exercise:** Run an nginx container, map a port, verify it serves traffic

      ### Module 2: Images & Layers
      **Objectives:** Build custom images, understand layering
      **Key Concepts:** Dockerfile, FROM, COPY, RUN, layer caching
      **Exercise:** Write a Dockerfile for a Python Flask app

      ### Module 3: Volumes & Networking
      **Objectives:** Persist data, connect containers
      **Key Concepts:** volumes, bind mounts, bridge networks, docker-compose networking
      **Exercise:** Set up a multi-container app with persistent storage
  assert:
    - type: llm-rubric
      value: |
        Recognizes the user is done with the TEACHING phase. Transitions state from TEACHING
        to EXERCISE in progress.json. Delegates to topic-explainer to assign a hands-on coding
        task for Module 1 (Containers 101). Exercise should be scoped to container concepts.

