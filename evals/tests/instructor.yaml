      **Key Concepts:** volumes, bind mounts, bridge networks, docker-compose networking
      **Exercise:** Set up a multi-container app with persistent storage
  assert:
    - type: llm-rubric
      value: |
        Recognizes the user is signaling exercise completion without using /review.
        Transitions state from EXERCISE to REVIEW. Delegates to code-reviewer with the
