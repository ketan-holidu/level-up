      [{"topic":"rust","workspace":"./rust/"},{"topic":"docker","workspace":"./docker/","started_at":"2026-03-18T10:00:00Z","last_active":"2026-03-19T10:00:00Z"},{"topic":"kubernetes","workspace":"./kubernetes/","started_at":"2026-03-20T10:00:00Z","last_active":"2026-03-22T14:00:00Z"}]

